<svg viewBox="0 0 1040 660" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Droid Sans Fallback',sans-serif">
  <rect width="1040" height="660" fill="#070d1a"/>
  <rect x="16" y="16" width="1008" height="628" rx="18" fill="#0b1422" stroke="#1e293b" stroke-width="2"/>
  <!-- header -->
  <circle cx="62" cy="68" r="24" fill="#1a0010" stroke="#f43f5e" stroke-width="2"/>
  <text x="62" y="78" font-size="28" fill="#f43f5e" text-anchor="middle" font-weight="bold">4</text>
  <text x="102" y="78" font-size="34" fill="#fecdd3" font-weight="bold">红线与终止条件</text>
  <text x="1004" y="74" font-size="18" fill="#475569" text-anchor="end">手册 §2.5</text>
  <line x1="40" y1="104" x2="1000" y2="104" stroke="#1e293b" stroke-width="1.5"/>

  <text x="40" y="142" font-size="20" fill="#fb7185" font-weight="bold">开工前冻结三项，事后一律不得回调</text>

  <g>
    <rect x="40" y="156" width="960" height="62" rx="10" fill="#1a0010" stroke="#f43f5e" stroke-width="1.2"/>
    <text x="68" y="194" font-size="22" fill="#f43f5e" font-weight="bold">1　故障规则 R</text>
    <text x="330" y="194" font-size="19" fill="#fecdd3">钉死"算不算一次故障"，禁止看着数据反向调 R</text>
  </g>
  <g>
    <rect x="40" y="226" width="960" height="62" rx="10" fill="#1a0010" stroke="#f43f5e" stroke-width="1.2"/>
    <text x="68" y="264" font-size="22" fill="#f43f5e" font-weight="bold">2　Kill-switch</text>
    <text x="330" y="264" font-size="19" fill="#fecdd3">预先承诺停做条件（终止权不交给未来的你）</text>
  </g>
  <g>
    <rect x="40" y="296" width="960" height="62" rx="10" fill="#1a0010" stroke="#f43f5e" stroke-width="1.2"/>
    <text x="68" y="334" font-size="22" fill="#f43f5e" font-weight="bold">3　诚实崩溃触发</text>
    <text x="330" y="334" font-size="19" fill="#fecdd3">回填时间戳 / 事后调 R → 判 E5 已塌 → 立即终止</text>
  </g>

  <!-- termination line -->
  <rect x="40" y="374" width="960" height="80" rx="10" fill="#150a00" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="64" y="406" font-size="19" fill="#fbbf24" font-weight="bold">预承诺终止线</text>
  <text x="64" y="436" font-size="18" fill="#fde68a">到第 X 月，N(t) 的 b 仍低于阈值 <tspan fill="#fbbf24" font-weight="bold">且</tspan> 找不到"当下的我会漏、仅靠记账捞回"的故障 → 终止</text>

  <!-- motivation -->
  <rect x="40" y="470" width="465" height="158" rx="10" fill="#1a0010" stroke="#f43f5e" stroke-width="1.2"/>
  <text x="64" y="504" font-size="20" fill="#fb7185" font-weight="bold">动机别从校准曲线榨</text>
  <text x="64" y="538" font-size="17" fill="#fecdd3">命中率"维持"是右删失、</text>
  <text x="64" y="564" font-size="17" fill="#fecdd3">无信息量。</text>
  <text x="64" y="600" font-size="17" fill="#f43f5e" font-weight="bold">对它正强化 = 重建自欺</text>

  <rect x="535" y="470" width="465" height="158" rx="10" fill="#001409" stroke="#34d399" stroke-width="1.5"/>
  <text x="559" y="504" font-size="20" fill="#34d399" font-weight="bold">动机挂当下吞吐量</text>
  <text x="559" y="538" font-size="17" fill="#d1fae5">本月台账定位 X 个故障；</text>
  <text x="559" y="566" font-size="17" fill="#d1fae5">本周 Y 个赌注揭晓、</text>
  <text x="559" y="600" font-size="17" fill="#d1fae5">其中 Z 个当场改写了我的判断</text>
</svg>
