<svg viewBox="0 0 1040 660" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
<defs>
  <radialGradient id="bg" cx="45%" cy="22%" r="72%">
    <stop offset="0%" stop-color="#001f18"/>
    <stop offset="100%" stop-color="#070d1a"/>
  </radialGradient>
  <radialGradient id="surf" cx="40%" cy="18%" r="78%">
    <stop offset="0%" stop-color="#001a14"/>
    <stop offset="100%" stop-color="#0b1422"/>
  </radialGradient>
  <linearGradient id="bord" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.55"/>
    <stop offset="45%" stop-color="#1e293b" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.22"/>
  </linearGradient>
  <linearGradient id="sep" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.75"/>
    <stop offset="55%" stop-color="#1e293b" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#1e293b" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="fmBox" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#001f16"/>
    <stop offset="100%" stop-color="#000f0a"/>
  </linearGradient>
  <linearGradient id="rowGn" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#001a0d"/>
    <stop offset="100%" stop-color="#000e08"/>
  </linearGradient>
  <linearGradient id="rowAm" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#1a1000"/>
    <stop offset="100%" stop-color="#0f0900"/>
  </linearGradient>
  <linearGradient id="rowRd" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#200010"/>
    <stop offset="100%" stop-color="#120008"/>
  </linearGradient>
  <linearGradient id="boxBlue" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#071828"/>
    <stop offset="100%" stop-color="#050e1a"/>
  </linearGradient>
  <linearGradient id="boxRed" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#1e0010"/>
    <stop offset="100%" stop-color="#120008"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="1040" height="660" fill="url(#bg)"/>

<!-- Corner accent dots -->
<circle cx="32" cy="32" r="2.5" fill="#2dd4bf" fill-opacity="0.22"/>
<circle cx="1008" cy="32" r="2.5" fill="#2dd4bf" fill-opacity="0.22"/>
<circle cx="32" cy="628" r="2.5" fill="#2dd4bf" fill-opacity="0.08"/>
<circle cx="1008" cy="628" r="2.5" fill="#2dd4bf" fill-opacity="0.08"/>

<!-- Card surface -->
<rect x="16" y="16" width="1008" height="628" rx="18" fill="url(#surf)"/>
<rect x="16" y="16" width="1008" height="628" rx="18" fill="none" stroke="url(#bord)" stroke-width="1.5"/>
<rect x="17" y="17" width="1006" height="626" rx="17.5" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.04"/>

<!-- SPEF watermark -->
<text x="996" y="646" font-size="12" fill="#1e293b" text-anchor="end" letter-spacing="4" font-weight="700" opacity="0.7">SPEF</text>

<!-- Badge with glow ring -->
<circle cx="62" cy="68" r="28" fill="#2dd4bf" fill-opacity="0.07"/>
<circle cx="62" cy="68" r="24" fill="#00140f" stroke="#2dd4bf" stroke-width="2"/>
<text x="62" y="78" font-size="28" fill="#2dd4bf" text-anchor="middle" font-weight="bold">3</text>

<!-- Title -->
<text x="102" y="72" font-size="33" fill="#99f6e4" font-weight="bold">押注判据 · L 三区制</text>

<!-- Reference -->
<text x="1004" y="57" font-size="11" fill="#2d3f5a" text-anchor="end" letter-spacing="2.5">手册</text>
<text x="1004" y="77" font-size="17" fill="#3d5478" text-anchor="end">§2.3</text>

<!-- Separator -->
<line x1="40" y1="104" x2="1000" y2="104" stroke="url(#sep)" stroke-width="1"/>

<!-- Formula box -->
<rect x="40" y="124" width="960" height="88" rx="12" fill="url(#fmBox)" stroke="#2dd4bf" stroke-width="1.5"/>
<rect x="40" y="124" width="4" height="88" rx="2" fill="#2dd4bf" opacity="0.65"/>
<text x="520" y="170" font-size="26" fill="#99f6e4" text-anchor="middle"><tspan font-family="'SFMono-Regular','Menlo','Consolas',monospace">L = R_L</tspan> (覆盖的真实风险占比) <tspan font-family="'SFMono-Regular','Menlo','Consolas',monospace">÷ φ</tspan> (主观押注覆盖率)</text>
<text x="520" y="200" font-size="15.5" fill="#2a4040" text-anchor="middle">按区制读，不按数值线性比；周期聚合后读，非单次评分</text>

<!-- L > 1 row (green) -->
<rect x="40" y="226" width="960" height="70" rx="10" fill="url(#rowGn)" stroke="#34d399" stroke-width="1.5"/>
<rect x="40" y="226" width="4" height="70" rx="2" fill="#34d399"/>
<text x="76" y="269" font-size="26" fill="#34d399" font-weight="bold" font-family="'SFMono-Regular','Consolas',monospace">L &gt; 1</text>
<text x="226" y="269" font-size="21" fill="#d1fae5">押对——带宽压在高风险处</text>
<text x="978" y="269" font-size="19" fill="#34d399" text-anchor="end" font-weight="bold">保持</text>

<!-- L ≈ 1 row (amber) -->
<rect x="40" y="304" width="960" height="70" rx="10" fill="url(#rowAm)" stroke="#f59e0b" stroke-width="1.5"/>
<rect x="40" y="304" width="4" height="70" rx="2" fill="#f59e0b"/>
<text x="76" y="347" font-size="26" fill="#fbbf24" font-weight="bold" font-family="'SFMono-Regular','Consolas',monospace">L ≈ 1</text>
<text x="226" y="347" font-size="21" fill="#fde68a">橡皮图章 / 昂贵均摊</text>
<text x="978" y="347" font-size="19" fill="#fbbf24" text-anchor="end" font-weight="bold">停止均摊，重新聚焦</text>

<!-- L < 1 row (red) -->
<rect x="40" y="382" width="960" height="70" rx="10" fill="url(#rowRd)" stroke="#f43f5e" stroke-width="1.5"/>
<rect x="40" y="382" width="4" height="70" rx="2" fill="#f43f5e"/>
<text x="76" y="425" font-size="26" fill="#f43f5e" font-weight="bold" font-family="'SFMono-Regular','Consolas',monospace">L &lt; 1</text>
<text x="226" y="425" font-size="21" fill="#fecdd3"><tspan font-weight="bold" fill="#fb7185">显著性陷阱</tspan>——专看不出事处</text>
<text x="978" y="425" font-size="19" fill="#f43f5e" text-anchor="end" font-weight="bold">警报：勤奋正在加害</text>

<!-- Bottom two boxes -->
<!-- Shallow vs Deep -->
<rect x="40" y="466" width="465" height="162" rx="10" fill="url(#boxBlue)" stroke="#1e3a5a" stroke-width="1.2"/>
<rect x="40" y="466" width="3" height="162" rx="1.5" fill="#3b82f6" opacity="0.55"/>
<text x="64" y="501" font-size="20" fill="#bfdbfe" font-weight="bold">深浅分流</text>
<text x="64" y="535" font-size="18" fill="#94a3b8">浅问题 → 重押直觉（错了不亏）</text>
<text x="64" y="567" font-size="18" fill="#94a3b8">深问题 → 早转扫描</text>
<text x="64" y="600" font-size="14.5" fill="#2a3a50">深 bug 不显眼，直觉胜率最低</text>

<!-- Most Dangerous Signal -->
<rect x="535" y="466" width="465" height="162" rx="10" fill="url(#boxRed)" stroke="#3d1020" stroke-width="1.2"/>
<rect x="535" y="466" width="3" height="162" rx="1.5" fill="#f43f5e" opacity="0.55"/>
<text x="559" y="501" font-size="20" fill="#fb7185" font-weight="bold">最危险信号</text>
<text x="559" y="535" font-size="18" fill="#fecdd3">扫得远超预期、概率却不升</text>
<text x="559" y="567" font-size="18" fill="#fecdd3">→ 不是"还没扫够"</text>
<text x="559" y="601" font-size="18" fill="#f43f5e" font-weight="bold">→ bug 在边界外，跳出去重扫边界</text>
</svg>
