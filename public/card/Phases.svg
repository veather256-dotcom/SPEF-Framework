<svg viewBox="0 0 1040 660" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Droid Sans Fallback',sans-serif">
  <rect width="1040" height="660" fill="#070d1a"/>
  <rect x="16" y="16" width="1008" height="628" rx="18" fill="#0b1422" stroke="#1e293b" stroke-width="2"/>
  <!-- header -->
  <circle cx="62" cy="68" r="24" fill="#05111f" stroke="#3b82f6" stroke-width="2"/>
  <text x="62" y="78" font-size="28" fill="#60a5fa" text-anchor="middle" font-weight="bold">1</text>
  <text x="102" y="78" font-size="34" fill="#bfdbfe" font-weight="bold">SPEF 四阶段与边界</text>
  <text x="1004" y="74" font-size="18" fill="#475569" text-anchor="end">手册 §2.1</text>
  <line x1="40" y1="104" x2="1000" y2="104" stroke="#1e293b" stroke-width="1.5"/>
  <!-- column headers -->
  <text x="70" y="140" font-size="17" fill="#64748b">环节</text>
  <text x="320" y="140" font-size="17" fill="#64748b">做什么</text>
  <text x="650" y="140" font-size="17" fill="#f43f5e">不做什么</text>

  <!-- rows -->
  <g>
    <rect x="40" y="152" width="960" height="74" rx="10" fill="#05111f" stroke="#1e293b"/>
    <text x="70" y="186" font-size="24" fill="#60a5fa" font-weight="bold">Scan</text>
    <text x="70" y="212" font-size="15" fill="#64748b">扫描</text>
    <text x="320" y="197" font-size="20" fill="#cbd5e1">读准系统/任务的真实状态</text>
    <text x="650" y="197" font-size="20" fill="#fecdd3">只读现实，不出方案</text>
  </g>
  <g>
    <rect x="40" y="234" width="960" height="74" rx="10" fill="#05111f" stroke="#1e293b"/>
    <text x="70" y="268" font-size="24" fill="#60a5fa" font-weight="bold">Plan</text>
    <text x="70" y="294" font-size="15" fill="#64748b">规划</text>
    <text x="320" y="279" font-size="20" fill="#cbd5e1">基于扫描制定方案</text>
    <text x="650" y="279" font-size="20" fill="#fecdd3">只出意图，不动手</text>
  </g>
  <g>
    <rect x="40" y="316" width="960" height="74" rx="10" fill="#05111f" stroke="#1e293b"/>
    <text x="70" y="350" font-size="24" fill="#60a5fa" font-weight="bold">Execute</text>
    <text x="70" y="376" font-size="15" fill="#64748b">执行</text>
    <text x="320" y="361" font-size="20" fill="#cbd5e1">实施方案</text>
    <text x="650" y="361" font-size="20" fill="#fecdd3">只忠实施加，不夹带判断</text>
  </g>
  <g>
    <rect x="40" y="398" width="960" height="74" rx="10" fill="#150a00" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="70" y="432" font-size="24" fill="#fbbf24" font-weight="bold">Feedback</text>
    <text x="70" y="458" font-size="15" fill="#94a3b8">反馈</text>
    <text x="320" y="443" font-size="20" fill="#fde68a">验证、闭合循环</text>
    <text x="650" y="443" font-size="20" fill="#fbbf24" font-weight="bold">必须有人参与</text>
  </g>

  <!-- footer principles -->
  <rect x="40" y="492" width="960" height="136" rx="10" fill="#00140f" stroke="#2dd4bf" stroke-width="1.2"/>
  <text x="64" y="528" font-size="19" fill="#99f6e4">▸ 理想配置：S/P/E 交给 Agent，<tspan fill="#2dd4bf" font-weight="bold">F 留给人</tspan>。</text>
  <text x="64" y="562" font-size="19" fill="#99f6e4">▸ 核心准则：正确性不靠"某步做对"，靠<tspan fill="#2dd4bf" font-weight="bold">"这个环能否稳定闭合"</tspan>。</text>
  <text x="64" y="596" font-size="19" fill="#99f6e4">▸ <tspan fill="#2dd4bf" font-weight="bold">只闭那个只有人能闭的环</tspan>，其余交给编译器/测试。</text>
  <text x="64" y="620" font-size="17" fill="#64748b">▸ S/P 交织处 = 双高节点（高耦合 × 高不可观）= 最该押注处。</text>
</svg>
