<svg viewBox="0 0 1040 660" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
<defs>
  <radialGradient id="bg" cx="45%" cy="22%" r="72%">
    <stop offset="0%" stop-color="#1e0010"/>
    <stop offset="100%" stop-color="#070d1a"/>
  </radialGradient>
  <radialGradient id="surf" cx="40%" cy="18%" r="78%">
    <stop offset="0%" stop-color="#180010"/>
    <stop offset="100%" stop-color="#0b1422"/>
  </radialGradient>
  <linearGradient id="bord" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.55"/>
    <stop offset="45%" stop-color="#1e293b" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.22"/>
  </linearGradient>
  <linearGradient id="sep" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.75"/>
    <stop offset="55%" stop-color="#1e293b" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#1e293b" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="commitRow" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#200012"/>
    <stop offset="100%" stop-color="#140009"/>
  </linearGradient>
  <linearGradient id="termLine" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#1c1200"/>
    <stop offset="100%" stop-color="#110b00"/>
  </linearGradient>
  <linearGradient id="boxRed" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#1e0010"/>
    <stop offset="100%" stop-color="#130009"/>
  </linearGradient>
  <linearGradient id="boxGn" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#001f14"/>
    <stop offset="100%" stop-color="#000f0a"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="1040" height="660" fill="url(#bg)"/>

<!-- Corner accent dots -->
<circle cx="32" cy="32" r="2.5" fill="#f43f5e" fill-opacity="0.22"/>
<circle cx="1008" cy="32" r="2.5" fill="#f43f5e" fill-opacity="0.22"/>
<circle cx="32" cy="628" r="2.5" fill="#f43f5e" fill-opacity="0.08"/>
<circle cx="1008" cy="628" r="2.5" fill="#f43f5e" fill-opacity="0.08"/>

<!-- Card surface -->
<rect x="16" y="16" width="1008" height="628" rx="18" fill="url(#surf)"/>
<rect x="16" y="16" width="1008" height="628" rx="18" fill="none" stroke="url(#bord)" stroke-width="1.5"/>
<rect x="17" y="17" width="1006" height="626" rx="17.5" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.04"/>

<!-- SPEF watermark -->
<text x="996" y="646" font-size="12" fill="#1e293b" text-anchor="end" letter-spacing="4" font-weight="700" opacity="0.7">SPEF</text>

<!-- Badge with glow ring -->
<circle cx="62" cy="68" r="28" fill="#f43f5e" fill-opacity="0.07"/>
<circle cx="62" cy="68" r="24" fill="#1a0010" stroke="#f43f5e" stroke-width="2"/>
<text x="62" y="78" font-size="28" fill="#f43f5e" text-anchor="middle" font-weight="bold">4</text>

<!-- Title -->
<text x="102" y="72" font-size="33" fill="#fecdd3" font-weight="bold">红线与终止条件</text>

<!-- Reference -->
<text x="1004" y="57" font-size="11" fill="#2d3f5a" text-anchor="end" letter-spacing="2.5">手册</text>
<text x="1004" y="77" font-size="17" fill="#3d5478" text-anchor="end">§2.5</text>

<!-- Separator -->
<line x1="40" y1="104" x2="1000" y2="104" stroke="url(#sep)" stroke-width="1"/>

<!-- Section label -->
<text x="64" y="140" font-size="13" fill="#9a3146" letter-spacing="1" font-weight="600">开工前冻结三项 · 事后一律不得回调</text>

<!-- Commit row 1 -->
<rect x="40" y="152" width="960" height="64" rx="10" fill="url(#commitRow)" stroke="#f43f5e" stroke-width="1.2"/>
<rect x="40" y="152" width="4" height="64" rx="2" fill="#f43f5e"/>
<circle cx="76" cy="184" r="14" fill="#f43f5e" fill-opacity="0.15" stroke="#f43f5e" stroke-width="1.2"/>
<text x="76" y="190" font-size="15" fill="#f43f5e" text-anchor="middle" font-weight="bold">1</text>
<text x="104" y="191" font-size="19" fill="#f43f5e" font-weight="bold">故障规则 R</text>
<text x="335" y="191" font-size="18" fill="#fecdd3">钉死「算不算一次故障」，禁止看着数据反向调 R</text>

<!-- Commit row 2 -->
<rect x="40" y="224" width="960" height="64" rx="10" fill="url(#commitRow)" stroke="#f43f5e" stroke-width="1.2"/>
<rect x="40" y="224" width="4" height="64" rx="2" fill="#f43f5e" opacity="0.8"/>
<circle cx="76" cy="256" r="14" fill="#f43f5e" fill-opacity="0.15" stroke="#f43f5e" stroke-width="1.2"/>
<text x="76" y="262" font-size="15" fill="#f43f5e" text-anchor="middle" font-weight="bold">2</text>
<text x="104" y="263" font-size="19" fill="#f43f5e" font-weight="bold">Kill-switch</text>
<text x="335" y="263" font-size="18" fill="#fecdd3">预先承诺停做条件（终止权不交给未来的你）</text>

<!-- Commit row 3 -->
<rect x="40" y="296" width="960" height="64" rx="10" fill="url(#commitRow)" stroke="#f43f5e" stroke-width="1.2"/>
<rect x="40" y="296" width="4" height="64" rx="2" fill="#f43f5e" opacity="0.6"/>
<circle cx="76" cy="328" r="14" fill="#f43f5e" fill-opacity="0.15" stroke="#f43f5e" stroke-width="1.2"/>
<text x="76" y="334" font-size="15" fill="#f43f5e" text-anchor="middle" font-weight="bold">3</text>
<text x="104" y="335" font-size="19" fill="#f43f5e" font-weight="bold">诚实崩溃触发</text>
<text x="335" y="335" font-size="18" fill="#fecdd3">回填时间戳 / 事后调 R → 判 E5 已塌 → 立即终止</text>

<!-- Termination line box -->
<rect x="40" y="374" width="960" height="82" rx="10" fill="url(#termLine)" stroke="#f59e0b" stroke-width="1.5"/>
<rect x="40" y="374" width="4" height="82" rx="2" fill="#f59e0b"/>
<text x="64" y="403" font-size="13" fill="#7a5410" letter-spacing="1" font-weight="600">预承诺终止线</text>
<text x="64" y="436" font-size="17.5" fill="#fde68a">到第 X 月，N(t) 的 b 仍低于阈值 <tspan fill="#fbbf24" font-weight="bold">且</tspan> 找不到「当下的我会漏、仅靠记账捞回」的故障 → 终止</text>

<!-- Bottom two boxes -->
<!-- Don't extract motivation -->
<rect x="40" y="470" width="465" height="158" rx="10" fill="url(#boxRed)" stroke="#3d1020" stroke-width="1.2"/>
<rect x="40" y="470" width="3" height="158" rx="1.5" fill="#f43f5e" opacity="0.55"/>
<text x="64" y="504" font-size="20" fill="#fb7185" font-weight="bold">动机别从校准曲线榨</text>
<text x="64" y="539" font-size="17" fill="#fecdd3">命中率「维持」是右删失、</text>
<text x="64" y="566" font-size="17" fill="#fecdd3">无信息量。</text>
<text x="64" y="601" font-size="17" fill="#f43f5e" font-weight="bold">对它正强化 = 重建自欺</text>

<!-- Anchor motivation to throughput -->
<rect x="535" y="470" width="465" height="158" rx="10" fill="url(#boxGn)" stroke="#1a3d28" stroke-width="1.2"/>
<rect x="535" y="470" width="3" height="158" rx="1.5" fill="#34d399" opacity="0.55"/>
<text x="559" y="504" font-size="20" fill="#34d399" font-weight="bold">动机挂当下吞吐量</text>
<text x="559" y="539" font-size="17" fill="#d1fae5">本月台账定位 X 个故障；</text>
<text x="559" y="566" font-size="17" fill="#d1fae5">本周 Y 个赌注揭晓、</text>
<text x="559" y="601" font-size="17" fill="#d1fae5">其中 Z 个当场改写了我的判断</text>
</svg>
